<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Empório Coisas de Minas</title>

    <style>
      /* ── Reset Expo/RN-Web ── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      /* ── Remove outline azul/preto do browser em inputs focados ── */
      input:focus, textarea:focus, select:focus {
        outline: none !important;
        box-shadow: none !important;
      }

      /* ── MODO DESKTOP: app simulado como celular centralizado ── */
      html, body {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #1A1A1A;
        overflow: hidden;
      }

      #root {
        width: 390px;
        height: 844px;
        border-radius: 40px;
        overflow: hidden;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7);
        position: relative;
        flex-shrink: 0;
      }

      /* ── MODO MOBILE: tela cheia ── */
      @media (max-width: 500px),
             (max-height: 860px) and (max-width: 600px) {
        html, body {
          display: block;
          background: #ede3d8;
          overflow: hidden;
        }

        #root {
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          width: 100%;
          height: 100%;
          border-radius: 0;
          box-shadow: none;
        }
      }
    </style>

    <link rel="icon" href="/favicon.ico" />
  </head>

  <body>
    <noscript>Você precisa habilitar o JavaScript para usar este app.</noscript>
    <div id="root"></div>
  </body>
</html>
